name: 웹훅 연결 테스트 (사용 후 삭제)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: 잔디 테스트 메시지 발송
        env:
          JANDI_WEBHOOK_URL: ${{ secrets.JANDI_WEBHOOK_URL }}
        run: |
          curl -sf -X POST "$JANDI_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"body":"✅ 경량 모니터링(ds-light-monitor) 웹훅 연결 테스트 — 이 메시지가 보이면 정상입니다","connectColor":"#34C759"}'
